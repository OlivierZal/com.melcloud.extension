<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <title>MELCloud Extension Settings</title>
        <script>
            // Registered at parse time: the SDK dispatches onHomeyReady on
            // its own schedule, before the module bundle has loaded. The
            // bundle loads as a parser-discovered static module (same fetch
            // path as the stylesheet) rather than a JS-initiated dynamic
            // import(), whose fetch fails on Android against Homey's local
            // .homeylocal.com origin (diagnosed from a boot-error report on
            // the sibling com.melcloud app, v45.2.4).
            window.homeyReady = new Promise((resolve) => {
                window.onHomeyReady = resolve
            })
            // onerror only fires if the module script itself fails to load;
            // once it loads, its own init ends the overlay.
            function reportSettingsBootFailure() {
                window.homeyReady.then((homey) => {
                    homey.api('POST', '/boot-error', { message: 'Failed to load the settings module script', name: 'BootError', stack: '' }, () => {})
                    homey.ready()
                    homey.alert(homey.__('settings.loadFailed')).catch((error) => {
                        globalThis.reportError?.(error)
                    })
                })
            }
        </script>
        <link href="styles.css?v=364176a1" rel="stylesheet">
        <script data-origin="settings" defer src="/homey.js"></script>
        <script type="module" onerror="reportSettingsBootFailure()" src="index.mjs?v=b8a64866"></script>
        <meta content="MELCloud extension settings" name="description">
    </head>
    <body>
        <header class="homey-header">
            <h1 class="homey-title" data-i18n="settings.title">MELCloud extension settings</h1>
        </header>
        <fieldset class="homey-form-fieldset">
            <legend class="homey-form-legend" data-i18n="settings.autoAdjust">Auto-adjust air conditioning temperature</legend>
            <div class="homey-form-group">
                <label
                    class="homey-form-label"
                    data-i18n="settings.enabled"
                    for="enabled"
                >Enabled</label>
                <select id="enabled" class="homey-form-select">
                    <option data-i18n="settings.boolean.false" value="false">No</option>
                    <option data-i18n="settings.boolean.true" value="true">Yes</option>
                </select>
            </div>
            <div class="container">
                <button
                    id="refresh"
                    type="button"
                    class="homey-button-secondary-shadow"
                    data-i18n="settings.refresh"
                >Refresh</button>
                <button
                    id="apply"
                    type="button"
                    class="homey-button-danger-shadow"
                    data-i18n="settings.update"
                >Update</button>
            </div>
        </fieldset>
        <fieldset class="homey-form-fieldset">
            <legend class="homey-form-legend" data-i18n="settings.log"></legend>
            <div
                id="logs"
                class="homey-form-group"
                aria-label="Log"
                role="log"
            ></div>
        </fieldset>
        <fieldset class="homey-form-fieldset">
            <legend class="homey-form-legend" data-i18n="settings.configuration">Configuration</legend>
            <div id="sources"></div>
            <div id="empty_state" hidden>
                <p data-i18n="settings.notFound">First, you need to set up your devices in the MELCloud Homey app.</p>
                <button
                    id="install"
                    type="button"
                    class="homey-button-primary-full"
                    data-i18n="settings.install"
                >Install the MELCloud app</button>
            </div>
        </fieldset>
    </body>
</html>
